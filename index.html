<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Guia completo de viagens pelo Sul do Brasil. Descubra os melhores destinos, pontos turísticos, hotéis e restaurantes em Paraná, Santa Catarina e Rio Grande do Sul.">
    <meta name="theme-color" content="#667eea">
    <title>Guia de Viagens - Explore o Sul do Brasil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="app-body">
    <header class="site-header" role="banner">
        <div class="header-inner">
            <button 
                id="homeBtn" 
                class="site-title" 
                aria-label="Voltar para página inicial"
                title="Clique para voltar ao início"
            >
                🗺️ Explore o Sul do Brasil
            </button>
            <form class="search-wrapper" role="search" onsubmit="event.preventDefault(); buscarDestino()">
                <label for="searchInput" class="search-label">Buscar destino:</label>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Digite o nome de uma cidade..." 
                    class="search-input"
                    aria-label="Campo de busca de destinos"
                >
                <button type="submit" class="search-button" aria-label="Buscar destino">
                    🔍 Buscar
                </button>
            </form>
        </div>
    </header>

    <main class="site-main" id="main-content">
        <section id="destino" class="intro-section" role="region" aria-live="polite" aria-label="Conteúdo do destino">
            <h1 class="intro-title">Bem-vindo ao Guia de Viagens</h1>
            <p class="intro-text">Selecione um estado ou busque uma cidade para descobrir as maravilhas do Sul!</p>
        </section>

        <section class="cards" id="cardsContainer" aria-label="Lista de destinos e cidades">
            <!-- Cards serão inseridos aqui dinamicamente -->
        </section>
    </main>

    <footer class="site-footer" role="contentinfo">
        <p class="footer-text">© 2026 Guia de Viagens no Sul do Brasil</p>
        <p class="footer-accessibility">
            <a href="#" title="Retornar ao topo da página">↑ Voltar ao topo</a>
        </p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
